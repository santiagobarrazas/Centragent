services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: centragent
      POSTGRES_PASSWORD: centragent
      POSTGRES_DB: centragent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U centragent -d centragent"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.12.6
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: centragent-dev:local
    environment:
      DATABASE_URL: "postgresql://centragent:centragent@postgres:5432/centragent?schema=public"
      REDIS_URL: "redis://redis:6379"
      QDRANT_URL: "http://qdrant:6333"
      MASTER_USER_ID: "${MASTER_USER_ID:-00000000-0000-4000-8000-000000000001}"
      MASTER_USER_NAME: "${MASTER_USER_NAME:-Local Master}"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -lc "corepack pnpm db:deploy && corepack pnpm db:seed"

  api:
    image: centragent-dev:local
    env_file:
      - .env
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "4000"
      DATABASE_URL: "postgresql://centragent:centragent@postgres:5432/centragent?schema=public"
      REDIS_URL: "redis://redis:6379"
      QDRANT_URL: "http://qdrant:6333"
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    command: corepack pnpm --filter @centragent/api dev

  mcp:
    image: centragent-dev:local
    environment:
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "3001"
      CENTRAGENT_API_URL: "http://api:4000"
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      api:
        condition: service_started
    command: corepack pnpm --filter @centragent/mcp dev

  web:
    image: centragent-dev:local
    environment:
      NEXT_PUBLIC_API_URL: "http://127.0.0.1:4000"
      NEXT_PUBLIC_WS_URL: "ws://127.0.0.1:4000/ws"
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      api:
        condition: service_started
    command: corepack pnpm --filter @centragent/web exec next dev -H 0.0.0.0 -p 3000

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
